<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coroinhas da Paróquia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-light: #F0D98A; --gold-pale: #FDF6E3;
    --brown-dark: #2C1A0E; --brown-mid: #5C3D1E; --brown-light: #A0714F;
    --cream: #FAF6EF; --white: #FFFFFF; --text: #2C1A0E; --text-muted: #8B6B4A;
    --border: #E8D9C0; --danger: #9B3A3A; --radius: 16px; --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(44,26,14,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  header { background: var(--brown-dark); padding: 24px 20px 20px; text-align: center; position: relative; }
  header::after { content: ''; display: block; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin-top: 16px; }
  .header-cross { font-size: 22px; color: var(--gold); margin-bottom: 6px; letter-spacing: 6px; }
  header h1 { font-family: 'Playfair Display', serif; color: var(--gold-light); font-size: 22px; font-weight: 700; }
  header p { color: var(--brown-light); font-size: 13px; margin-top: 4px; font-weight: 300; }
  .tabs { display: flex; background: var(--brown-dark); padding: 0 16px 16px; gap: 8px; }
  .tab { flex: 1; padding: 10px 8px; border: 1.5px solid var(--brown-mid); border-radius: var(--radius-sm); background: transparent; color: var(--brown-light); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: center; }
  .tab.active { background: var(--gold); border-color: var(--gold); color: var(--brown-dark); font-weight: 600; }
  .page { display: none; padding: 20px 16px; }
  .page.active { display: block; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--brown-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; margin-top: 14px; }
  label:first-child { margin-top: 0; }
  input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); background: var(--cream); transition: border-color 0.2s; outline: none; appearance: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); background: var(--white); }
  textarea { resize: none; height: 72px; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 18px; }
  .btn-primary { background: var(--gold); color: var(--brown-dark); }
  .btn-primary:active { transform: scale(0.98); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--brown-dark); color: var(--gold-light); padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s ease; white-space: nowrap; border: 1px solid var(--gold); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); border-color: #c96060; }
  .coroinha-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(44,26,14,0.06); }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--gold-pale); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 18px; color: var(--brown-mid); flex-shrink: 0; }
  .coroinha-info { flex: 1; }
  .coroinha-nome { font-weight: 600; font-size: 15px; }
  .coroinha-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .chevron { color: var(--border); font-size: 18px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; background: var(--gold-pale); color: var(--brown-mid); border: 1px solid var(--gold); margin: 2px 2px 2px 0; }
  .hist-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .hist-item:last-child { border-bottom: none; }
  .hist-funcoes { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
  .hist-data { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .hist-obs { font-size: 12px; color: var(--text-muted); margin-top: 3px; font-style: italic; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; color: var(--border); }
  .empty p { font-size: 14px; }
  .back-btn { display: flex; align-items: center; gap: 8px; color: var(--gold); font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 16px; background: none; border: none; padding: 0; }
  .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding: 16px; background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); }
  .detail-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--gold-pale); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 24px; color: var(--brown-mid); flex-shrink: 0; }
  .detail-nome { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
  .detail-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .loading { text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Checkboxes de coroinhas */
  .check-lista { border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--cream); max-height: 200px; overflow-y: auto; }
  .check-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; transition: background 0.15s; }
  .check-item:last-child { border-bottom: none; }
  .check-item.selecionado { background: var(--gold-pale); }
  .check-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer; flex-shrink: 0; padding: 0; margin: 0; }
  .check-nome { font-size: 14px; font-weight: 500; color: var(--text); }

  /* Chips de funções */
  .funcoes-chips { display: flex; flex-wrap: wrap; gap: 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--cream); padding: 12px; }
  .funcao-chip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 50px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text); user-select: none; transition: all 0.15s; text-transform: none !important; letter-spacing: 0 !important; margin-top: 0 !important; white-space: nowrap; }
  .funcao-chip.selecionada { background: var(--gold-pale); border-color: var(--gold); color: var(--brown-mid); }
  .funcao-chip input[type=checkbox] { width: 13px; height: 13px; accent-color: var(--gold); cursor: pointer; padding: 0; margin: 0; flex-shrink: 0; }
  .funcao-chip span { text-transform: none; letter-spacing: 0; font-size: 13px; }

  .stat-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .stat-label { font-size:13px; font-weight:500; color:var(--text); min-width:120px; flex-shrink:0; }
  .stat-bar-wrap { flex:1; background:var(--border); border-radius:50px; height:8px; overflow:hidden; }
  .stat-bar { height:8px; background:var(--gold); border-radius:50px; transition:width 0.4s ease; }
  .stat-count { font-size:13px; font-weight:600; color:var(--brown-mid); min-width:28px; text-align:right; }
  .stat-empty { font-size:13px; color:var(--text-muted); text-align:center; padding:16px 0; }
  .select-wrapper-native { position:relative; }
  .select-wrapper-native::after { content:"▾"; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }

  .contador { display: inline-block; font-size: 11px; font-weight: 600; background: var(--gold-pale); color: var(--brown-mid); border: 1px solid var(--gold); border-radius: 50px; padding: 2px 8px; margin-left: 6px; vertical-align: middle; }
  .btn-ordem { flex:1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--white); color: var(--text-muted); font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-ordem.active { background: var(--gold-pale); border-color: var(--gold); color: var(--brown-mid); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="header-cross">✝</div>
  <h1>Coroinhas da Paróquia Santa Edwiges</h1>
  <p>Organização geral</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('historico', this)">Histórico</button>
  <button class="tab" onclick="showTab('cadastrar', this)">Cadastrar</button>
  <button class="tab" onclick="showTab('funcao', this)">Registrar Função</button>
  <button class="tab" onclick="showTab('stats', this)">Estatísticas</button>
</div>

<!-- HISTÓRICO -->
<div id="page-historico" class="page active">
  <div id="detalhe-coroinha" style="display:none;">
    <button class="back-btn" onclick="fecharDetalhe()">← Voltar</button>
    <div id="detalhe-header"></div>
    <div class="section-title">Estatísticas</div>
    <div class="card" id="detalhe-stats" style="margin-bottom:14px;"></div>
    <div class="section-title">Histórico</div>
    <div class="card" id="detalhe-historico"></div>
  </div>
  <div id="lista-coroinhas">
    <div class="section-title">Coroinhas</div>
    <input type="text" id="busca-historico" placeholder="Buscar coroinha..." oninput="filtrarLista()" style="margin-bottom:10px;">
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button id="btn-ordem-nome" class="btn-ordem active" onclick="setOrdem('nome')">A–Z Nome</button>
      <button id="btn-ordem-idade" class="btn-ordem" onclick="setOrdem('idade')">↑ Mais novo</button>
    </div>
    <div id="lista-container">
      <div class="loading"><div class="spinner"></div>Carregando...</div>
    </div>
  </div>
</div>

<!-- CADASTRAR -->
<div id="page-cadastrar" class="page">
  <div class="section-title">Novo Coroinha</div>
  <div class="card">
    <label>Nome completo</label>
    <input type="text" id="cad-nome" placeholder="Nome">
    <label>Data de nascimento <span style="font-size:11px;color:var(--text-muted);text-transform:none">(a idade é calculada automaticamente)</span></label>
    <input type="date" id="cad-nasc">
    <button class="btn btn-primary" onclick="cadastrarCoroinha()">Salvar coroinha</button>
  </div>
</div>

<!-- REGISTRAR FUNÇÃO -->
<div id="page-funcao" class="page">
  <div class="section-title">Registrar Função</div>
  <div class="card">

    <label>Coroinhas <span id="cnt-coroinhas" class="contador" style="display:none"></span></label>
    <input type="text" id="busca-funcao" placeholder="Buscar coroinha..." oninput="filtrarCheckCoroinhas()" style="margin-bottom:8px;">
    <div class="check-lista" id="lista-check-coroinhas">
      <div class="loading"><div class="spinner"></div>Carregando...</div>
    </div>

    <label>Funções na missa <span id="cnt-funcoes" class="contador" style="display:none"></span></label>
    <div class="funcoes-chips">
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Ambão"><span>Ambão</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Carrilhão"><span>Carrilhão</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Cerimonário"><span>Cerimonário</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Cruz"><span>Cruz</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Ofertório"><span>Ofertório</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Pasta"><span>Pasta</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Patena"><span>Patena</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Purificação"><span>Purificação</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Sino de trás"><span>Sino de trás</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Turíbulo"><span>Turíbulo</span></label>
      <label class="funcao-chip" onclick="atualizarChip(this)"><input type="checkbox" value="Vela"><span>Vela</span></label>
    </div>

    <label>Horário da missa</label>
    <div class="select-wrapper" style="position:relative;">
      <select id="func-horario" onchange="toggleMissaEspecial()" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--cream);outline:none;appearance:none;">
        <option value="">Selecione...</option>
        <option value="Sábado 17h">Sábado 17h</option>
        <option value="Domingo 7h">Domingo 7h</option>
        <option value="Domingo 9h">Domingo 9h</option>
        <option value="Domingo 17h">Domingo 17h</option>
        <option value="Missa Especial">Missa Especial</option>
      </select>
      <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;">▾</span>
    </div>
    <div id="campo-missa-especial" style="display:none;margin-top:8px;">
      <input type="text" id="func-missa-especial" placeholder="Ex: Casamento, Funeral, Festa do Padroeiro...">
    </div>

    <label>Data da missa</label>
    <input type="date" id="func-data">

    <label>Observação (opcional)</label>
    <textarea id="func-obs" placeholder="Ex: Missa de domingo, festa de Nossa Senhora..."></textarea>

    <button class="btn btn-primary" onclick="registrarFuncao()">Registrar</button>
  </div>
</div>

<!-- ESTATÍSTICAS -->
<div id="page-stats" class="page">
  <div class="section-title">Estatísticas</div>

  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <button class="btn-ordem active" id="stat-mes-btn" onclick="setMes(0)">Este mês</button>
    <button class="btn-ordem" id="stat-mes-ant-btn" onclick="setMes(1)">Mês anterior</button>
    <button class="btn-ordem" id="stat-tudo-btn" onclick="setMes(-1)">Tudo</button>
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;">Missas por horário</div>
    <div id="stat-horarios"></div>
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;">Funções mais usadas</div>
    <div id="stat-funcoes"></div>
  </div>

  <div class="card">
    <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;">Coroinhas que mais serviram</div>
    <div id="stat-coroinhas"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://gehccrknzobcurclbnpt.supabase.co/rest/v1';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlaGNjcmtuem9iY3VyY2xibnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTA1ODksImV4cCI6MjA5NDg2NjU4OX0.7cb1EbKn_XtOTM6PkxxoktQV7qGtYQ7kd_okJ9jhUVA';
const HEADERS = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function api(path, method='GET', body=null) {
  const opts = { method, headers: HEADERS };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPA_URL + path, opts);
  if (!r.ok) throw new Error(await r.text());
  if (r.status === 204) return null;
  return r.json();
}

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3500);
}

function iniciais(nome) {
  return nome.trim().split(' ').slice(0,2).map(n=>n[0].toUpperCase()).join('');
}

function formatarData(d) {
  if (!d) return '';
  const [y,m,dia] = d.split('-');
  return dia+'/'+m+'/'+y;
}

let coroinhas = [];

async function carregarCoroinhas() {
  try {
    coroinhas = await api('/coroinhas?order=nome');
    renderLista();
    renderCheckCoroinhas();
  } catch(e) {
    document.getElementById('lista-container').innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><p>Erro ao carregar. Verifique sua conexão.</p></div>';
  }
}

let ordemAtual = "nome";
let ordemNomeAsc = true;
let ordemIdadeAsc = true;

function setOrdem(ordem) {
  if (ordemAtual === ordem) {
    if (ordem === "nome") ordemNomeAsc = !ordemNomeAsc;
    else ordemIdadeAsc = !ordemIdadeAsc;
  } else {
    ordemAtual = ordem;
  }
  document.querySelectorAll(".btn-ordem").forEach(b => b.classList.remove("active"));
  document.getElementById("btn-ordem-" + ordem).classList.add("active");
  document.getElementById("btn-ordem-nome").textContent = ordemNomeAsc ? "A–Z Nome" : "Z–A Nome";
  document.getElementById("btn-ordem-idade").textContent = ordemIdadeAsc ? "↑ Mais novo" : "↓ Mais velho";
  filtrarLista();
}

function calcularIdade(dataNasc) {
  if (!dataNasc) return null;
  const hoje = new Date();
  const nasc = new Date(dataNasc);
  let idade = hoje.getFullYear() - nasc.getFullYear();
  const m = hoje.getMonth() - nasc.getMonth();
  if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
  return idade;
}

function renderLista(filtro='') {
  const el = document.getElementById('lista-container');
  let lista = filtro ? coroinhas.filter(c => c.nome.toLowerCase().includes(filtro.toLowerCase())) : [...coroinhas];
  if (ordemAtual === 'nome') {
    lista.sort((a, b) => ordemNomeAsc ? a.nome.localeCompare(b.nome) : b.nome.localeCompare(a.nome));
  } else {
    lista.sort((a, b) => {
      const ia = a.idade || calcularIdade(a.data_nascimento) || 999;
      const ib = b.idade || calcularIdade(b.data_nascimento) || 999;
      return ordemIdadeAsc ? ia - ib : ib - ia;
    });
  }
  if (!lista.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✝</div><p>' + (filtro ? 'Nenhum resultado encontrado.' : 'Nenhum coroinha cadastrado ainda.') + '</p></div>';
    return;
  }
  el.innerHTML = lista.map(c => {
    const idade = c.idade || calcularIdade(c.data_nascimento);
    return `
    <div class="coroinha-item" onclick="abrirDetalhe('${c.id}','${c.nome.replace(/'/g,"\\'")}',${idade||'null'})">
      <div class="avatar">${iniciais(c.nome)}</div>
      <div class="coroinha-info">
        <div class="coroinha-nome">${c.nome}</div>
        <div class="coroinha-sub">${idade ? idade + ' anos' : ''}</div>
      </div>
      <span class="chevron">›</span>
    </div>`;
  }).join('');
}

function filtrarLista() {
  renderLista(document.getElementById('busca-historico').value);
}

function renderCheckCoroinhas(filtro='') {
  const el = document.getElementById('lista-check-coroinhas');
  const lista = filtro ? coroinhas.filter(c => c.nome.toLowerCase().includes(filtro.toLowerCase())) : coroinhas;
  if (!lista.length) {
    el.innerHTML = '<div class="empty"><p>' + (filtro ? 'Nenhum resultado.' : 'Nenhum coroinha cadastrado.') + '</p></div>';
    return;
  }
  el.innerHTML = lista.map(c => `
    <label class="check-item" onclick="atualizarCheckCoroinha(this)">
      <input type="checkbox" value="${c.id}">
      <span class="check-nome">${c.nome}</span>
    </label>
  `).join('');
}

function filtrarCheckCoroinhas() {
  renderCheckCoroinhas(document.getElementById('busca-funcao').value);
}

function atualizarCheckCoroinha(el) {
  setTimeout(() => {
    const cb = el.querySelector('input');
    el.classList.toggle('selecionado', cb.checked);
    const total = document.querySelectorAll('#lista-check-coroinhas input:checked').length;
    const cnt = document.getElementById('cnt-coroinhas');
    if (total > 0) { cnt.style.display = 'inline'; cnt.textContent = total + ' selecionado' + (total > 1 ? 's' : ''); }
    else cnt.style.display = 'none';
  }, 0);
}

function atualizarChip(el) {
  setTimeout(() => {
    const cb = el.querySelector('input');
    el.classList.toggle('selecionada', cb.checked);
    const total = document.querySelectorAll('.funcao-chip input:checked').length;
    const cnt = document.getElementById('cnt-funcoes');
    if (total > 0) { cnt.style.display = 'inline'; cnt.textContent = total + ' selecionada' + (total > 1 ? 's' : ''); }
    else cnt.style.display = 'none';
  }, 0);
}

let detalheHistAll = [];
let detalheMesSel = '';

function renderDetalheStats(mesKey) {
  detalheMesSel = mesKey;
  const hoje = new Date();
  const mesAtual = hoje.toISOString().slice(0,7);
  // 'mes' = este mês, 'anteriores' = tudo exceto este mês
  const hist = mesKey === 'mes'
    ? detalheHistAll.filter(h => h.data_missa && h.data_missa.slice(0,7) === mesAtual)
    : detalheHistAll.filter(h => h.data_missa && h.data_missa.slice(0,7) !== mesAtual);

  const elStats = document.getElementById('detalhe-stats');

  document.querySelectorAll('.btn-detalhe-mes').forEach(b => {
    b.classList.toggle('active', b.dataset.mes === mesKey);
  });

  if (!hist.length) {
    elStats.querySelector('#detalhe-stats-body').innerHTML = '<div class="stat-empty">Sem registros neste período.</div>';
    return;
  }

  // Horários
  const hCount = {};
  hist.forEach(h => { const k = h.horario || 'Não informado'; hCount[k] = (hCount[k]||0)+1; });
  const hMax = Math.max(...Object.values(hCount), 1);
  const hOrdem = ['Sábado 17h','Domingo 7h','Domingo 9h','Domingo 17h'];
  const hSorted = hOrdem.filter(k => hCount[k]).concat(Object.keys(hCount).filter(k => !hOrdem.includes(k)));

  // Funções
  const fCount = {};
  hist.forEach(h => h.funcao.split(',').forEach(f => { const k=f.trim(); fCount[k]=(fCount[k]||0)+1; }));
  const fSorted = Object.entries(fCount).sort((a,b) => b[1]-a[1]);
  const fMax = fSorted[0]?.[1] || 1;

  const totalMes = detalheHistAll.filter(h => h.data_missa && h.data_missa.slice(0,7) === mesAtual).length;

  elStats.querySelector('#detalhe-stats-body').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;">
      <div style="flex:1;background:var(--gold-pale);border:1px solid var(--gold);border-radius:12px;padding:14px;text-align:center;">
        <div style="font-size:28px;font-weight:700;color:var(--brown-mid);font-family:'Playfair Display',serif;">${detalheHistAll.length}</div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:4px;">Total geral</div>
      </div>
      <div style="flex:1;background:var(--gold-pale);border:1px solid var(--gold);border-radius:12px;padding:14px;text-align:center;">
        <div style="font-size:28px;font-weight:700;color:var(--brown-mid);font-family:'Playfair Display',serif;">${totalMes}</div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:4px;">Neste mês</div>
      </div>
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;">Missas por horário</div>
    ${hSorted.map(k => `
      <div class="stat-row">
        <span class="stat-label">${k}</span>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(hCount[k]/hMax*100)}%"></div></div>
        <span class="stat-count">${hCount[k]}</span>
      </div>`).join('')}
    <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 10px;">Funções mais exercidas</div>
    ${fSorted.map(([k,v]) => `
      <div class="stat-row">
        <span class="stat-label">${k}</span>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(v/fMax*100)}%"></div></div>
        <span class="stat-count">${v}</span>
      </div>`).join('')}
  `;
}

async function abrirDetalhe(id, nome, idade) {
  document.getElementById('lista-coroinhas').style.display = 'none';
  document.getElementById('detalhe-coroinha').style.display = 'block';
  document.getElementById('detalhe-header').innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar">${iniciais(nome)}</div>
      <div>
        <div class="detail-nome">${nome}</div>
        <div class="detail-sub">${idade ? idade + ' anos' : 'Idade não informada'}</div>
      </div>
    </div>`;
  const el = document.getElementById('detalhe-historico');
  const elStats = document.getElementById('detalhe-stats');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando...</div>';
  elStats.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando...</div>';

  try {
    detalheHistAll = await api('/historico_funcoes?coroinha_id=eq.'+id+'&order=data_missa.desc');

    if (!detalheHistAll.length) {
      elStats.innerHTML = '<div class="empty"><p>Nenhuma estatística ainda.</p></div>';
      el.innerHTML = '<div class="empty"><p>Nenhuma função registrada ainda.</p></div>';
      return;
    }

    elStats.innerHTML = `
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <button class="btn-ordem btn-detalhe-mes active" data-mes="mes" onclick="renderDetalheStats('mes')">Este mês</button>
        <button class="btn-ordem btn-detalhe-mes" data-mes="anteriores" onclick="renderDetalheStats('anteriores')">Meses anteriores</button>
      </div>
      <div id="detalhe-stats-body"></div>
    `;

    renderDetalheStats('mes');

    // Histórico completo
    el.innerHTML = detalheHistAll.map(h => `
      <div class="hist-item">
        <div class="hist-funcoes">${h.funcao.split(',').map(f => '<span class="badge">'+f.trim()+'</span>').join('')}</div>
        <div class="hist-data">${formatarData(h.data_missa)}${h.horario ? ' · ' + h.horario : ''}</div>
        ${h.observacao ? '<div class="hist-obs">'+h.observacao+'</div>' : ''}
      </div>
    `).join('');

  } catch(e) {
    el.innerHTML = '<div class="empty"><p>Erro ao carregar histórico.</p></div>';
    elStats.innerHTML = '<div class="empty"><p>Erro ao carregar.</p></div>';
  }
}

function fecharDetalhe() {
  document.getElementById('detalhe-coroinha').style.display = 'none';
  document.getElementById('lista-coroinhas').style.display = 'block';
}

async function cadastrarCoroinha() {
  const nome = document.getElementById('cad-nome').value.trim();
  const nasc = document.getElementById('cad-nasc').value;
  if (!nome) { toast('Informe o nome do coroinha', true); return; }
  const idade = calcularIdade(nasc);
  try {
    await api('/coroinhas', 'POST', { nome, idade: idade || null, data_nascimento: nasc || null });
    toast('Coroinha cadastrado!');
    document.getElementById('cad-nome').value = '';
    document.getElementById('cad-nasc').value = '';
    carregarCoroinhas();
  } catch(e) { toast('Erro ao salvar. Tente novamente.', true); }
}

async function registrarFuncao() {
  const coroinhasSel = [...document.querySelectorAll('#lista-check-coroinhas input:checked')].map(cb => cb.value);
  const funcoesSel = [...document.querySelectorAll('.funcao-chip input:checked')].map(cb => cb.value);
  const data_missa = document.getElementById('func-data').value;
  const observacao = document.getElementById('func-obs').value.trim();
  let horario = document.getElementById('func-horario').value;
  if (horario === 'Missa Especial') {
    const esp = document.getElementById('func-missa-especial').value.trim();
    horario = esp ? 'Especial: ' + esp : 'Missa Especial';
  }

  if (!coroinhasSel.length) { toast('Selecione ao menos um coroinha', true); return; }
  if (!funcoesSel.length) { toast('Selecione ao menos uma função', true); return; }
  if (!horario) { toast('Selecione o horário da missa', true); return; }
  if (!data_missa) { toast('Informe a data da missa', true); return; }

  const funcao = funcoesSel.join(', ');
  try {
    const registros = coroinhasSel.map(coroinha_id => ({ coroinha_id, funcao, horario, data_missa, observacao: observacao || null }));
    await api('/historico_funcoes', 'POST', registros);
    const nc = coroinhasSel.length, nf = funcoesSel.length;
    toast('✓ ' + nf + ' função' + (nf>1?'ões':'') + ' para ' + nc + ' coroinha' + (nc>1?'s':'') + '!');
    document.querySelectorAll('#lista-check-coroinhas input').forEach(cb => cb.checked = false);
    document.querySelectorAll('#lista-check-coroinhas .check-item').forEach(el => el.classList.remove('selecionado'));
    document.querySelectorAll('.funcao-chip input').forEach(cb => cb.checked = false);
    document.querySelectorAll('.funcao-chip').forEach(el => el.classList.remove('selecionada'));
    document.getElementById('cnt-coroinhas').style.display = 'none';
    document.getElementById('cnt-funcoes').style.display = 'none';
    document.getElementById('func-obs').value = '';
    document.getElementById('func-horario').value = '';
    document.getElementById('campo-missa-especial').style.display = 'none';
    document.getElementById('func-missa-especial').value = '';
  } catch(e) { toast('Erro ao registrar. Tente novamente.', true); }
}

function toggleMissaEspecial() {
  const val = document.getElementById('func-horario').value;
  document.getElementById('campo-missa-especial').style.display = val === 'Missa Especial' ? 'block' : 'none';
}

let statMesOffset = 0; // 0=este mês, 1=anterior, -1=tudo

function setMes(offset) {
  statMesOffset = offset;
  ['mes','mes-ant','tudo'].forEach((id,i) => {
    document.getElementById('stat-' + id + '-btn').classList.toggle('active', [0,1,-1][i] === offset);
  });
  carregarStats();
}

async function carregarStats() {
  const hoje = new Date();
  let filtro = '';
  if (statMesOffset >= 0) {
    const ano = hoje.getFullYear();
    const mes = hoje.getMonth() - statMesOffset;
    const d = new Date(ano, mes, 1);
    const fim = new Date(ano, mes + 1, 0);
    const pad = n => String(n).padStart(2,'0');
    filtro = '&data_missa=gte.' + d.getFullYear() + '-' + pad(d.getMonth()+1) + '-01'
           + '&data_missa=lte.' + fim.getFullYear() + '-' + pad(fim.getMonth()+1) + '-' + pad(fim.getDate());
  }

  try {
    const hist = await api('/historico_funcoes?select=coroinha_id,funcao,horario,data_missa' + filtro);

    // Horários
    const hCount = {};
    hist.forEach(h => { const k = h.horario || 'Não informado'; hCount[k] = (hCount[k]||0) + 1; });
    const hMax = Math.max(...Object.values(hCount), 1);
    const hOrdem = ['Sábado 17h','Domingo 7h','Domingo 9h','Domingo 17h','Missa Especial','Não informado'];
    const hSorted = hOrdem.filter(k => hCount[k]).concat(Object.keys(hCount).filter(k => !hOrdem.includes(k)));
    document.getElementById('stat-horarios').innerHTML = hSorted.length ? hSorted.map(k =>
      `<div class="stat-row"><span class="stat-label">${k}</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(hCount[k]/hMax*100)}%"></div></div><span class="stat-count">${hCount[k]}</span></div>`
    ).join('') : '<div class="stat-empty">Sem registros no período.</div>';

    // Funções
    const fCount = {};
    hist.forEach(h => { h.funcao.split(',').forEach(f => { const k=f.trim(); fCount[k]=(fCount[k]||0)+1; }); });
    const fSorted = Object.entries(fCount).sort((a,b) => b[1]-a[1]);
    const fMax = fSorted[0]?.[1] || 1;
    document.getElementById('stat-funcoes').innerHTML = fSorted.length ? fSorted.map(([k,v]) =>
      `<div class="stat-row"><span class="stat-label">${k}</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(v/fMax*100)}%"></div></div><span class="stat-count">${v}</span></div>`
    ).join('') : '<div class="stat-empty">Sem registros no período.</div>';

    // Coroinhas
    const cCount = {};
    hist.forEach(h => { cCount[h.coroinha_id]=(cCount[h.coroinha_id]||0)+1; });
    const cSorted = Object.entries(cCount).sort((a,b) => b[1]-a[1]).slice(0,5);
    const cMax = cSorted[0]?.[1] || 1;
    document.getElementById('stat-coroinhas').innerHTML = cSorted.length ? cSorted.map(([id,v]) => {
      const c = coroinhas.find(x => x.id === id);
      const nome = c ? c.nome : 'Desconhecido';
      return `<div class="stat-row"><span class="stat-label">${nome}</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(v/cMax*100)}%"></div></div><span class="stat-count">${v}</span></div>`;
    }).join('') : '<div class="stat-empty">Sem registros no período.</div>';

  } catch(e) {
    ['stat-horarios','stat-funcoes','stat-coroinhas'].forEach(id => {
      document.getElementById(id).innerHTML = '<div class="stat-empty">Erro ao carregar.</div>';
    });
  }
}

function showTab(tab, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'historico') fecharDetalhe();
  if (tab === 'stats') carregarStats();
}

document.getElementById('func-data').value = new Date().toISOString().split('T')[0];
carregarCoroinhas();
</script>
